{{- if eq .Values.mode "infra" }}
{{- $blueAppSecretName := include "cnpg-bg.blueAppSecretName" . -}}
{{- $blueReplicaSecretName := include "cnpg-bg.blueReplicaSecretName" . -}}
{{- $appPasswordKey := include "cnpg-bg.appPasswordKey" . -}}
{{- $replicaPasswordKey := include "cnpg-bg.replicaPasswordKey" . -}}
{{- $credentials := get .Values "credentials" | default dict -}}
{{- $credentialsSecret := get $credentials "secret" | default dict -}}
{{- $replication := get .Values "replication" | default dict -}}
{{- $replicationSecret := get $replication "secret" | default dict -}}
{{- $createAppSecret := get $credentialsSecret "create" | default true -}}
{{- $createReplicaSecret := get $replicationSecret "create" | default true -}}
{{- $blueAppExisting := lookup "v1" "Secret" .Release.Namespace $blueAppSecretName }}
{{- $appPassword := .Values.credentials.password }}
{{- if and (not $appPassword) $blueAppExisting $blueAppExisting.data }}
{{- $appRaw := get $blueAppExisting.data $appPasswordKey }}
{{- if not $appRaw }}
{{- $appRaw = get $blueAppExisting.data "password" }}
{{- end }}
{{- if $appRaw }}
{{- $appPassword = $appRaw | b64dec }}
{{- end }}
{{- end }}
{{- if and (not $appPassword) $createAppSecret }}
{{- $appPassword = randAlphaNum 24 }}
{{- end }}
{{- $blueReplicaExisting := lookup "v1" "Secret" .Release.Namespace $blueReplicaSecretName }}
{{- $replicaPassword := .Values.replication.password }}
{{- if and (not $replicaPassword) $blueReplicaExisting $blueReplicaExisting.data }}
{{- $replicaRaw := get $blueReplicaExisting.data $replicaPasswordKey }}
{{- if not $replicaRaw }}
{{- $replicaRaw = get $blueReplicaExisting.data "password" }}
{{- end }}
{{- if $replicaRaw }}
{{- $replicaPassword = $replicaRaw | b64dec }}
{{- end }}
{{- end }}
{{- if and (not $replicaPassword) $createReplicaSecret }}
{{- $replicaPassword = randAlphaNum 24 }}
{{- end }}
{{- if $createAppSecret }}
---
# App credentials shared by blue/green
apiVersion: v1
kind: Secret
metadata:
  name: {{ $blueAppSecretName }}
  labels:
    {{- include "cnpg-bg.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.credentials.username }}
  password: {{ $appPassword | quote }}
  {{- if ne $appPasswordKey "password" }}
  {{ $appPasswordKey }}: {{ $appPassword | quote }}
  {{- end }}
{{- end }}
{{- if $createReplicaSecret }}
---
# Replication credentials shared by blue/green
# basic-auth type + cnpg.io/reload label so the operator consumes it as a
# managed-role passwordSecret and reconciles password changes automatically.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $blueReplicaSecretName }}
  labels:
    {{- include "cnpg-bg.labels" . | nindent 4 }}
    cnpg.io/reload: "true"
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.replication.username }}
  password: {{ $replicaPassword | quote }}
  {{- if ne $replicaPasswordKey "password" }}
  {{ $replicaPasswordKey }}: {{ $replicaPassword | quote }}
  {{- end }}
{{- end }}
{{- if .Values.pgbouncer.enabled }}
---
# PgBouncer userlist — read by auth_file in pgbouncer.ini
apiVersion: v1
kind: Secret
metadata:
  name: pgbouncer-userlist
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnpg-bg.labels" . | nindent 4 }}
type: Opaque
stringData:
  # checkov:skip=CKV_SECRET_6:demo placeholder — replace in production
  userlist.txt: |
    "{{ .Values.credentials.username }}" "{{ required "credentials.password must be set or resolvable from the blue app Secret when pgbouncer is enabled" $appPassword }}"
{{- end }}
{{- end }}
