apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
data:
  DATABASE_URL: "postgresql://appuser:changeme123@pgbouncer.cnpg-demo.svc.cluster.local:5432/appdb?sslmode=disable"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: demo-app:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: demo-app-config
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
      restartPolicy: Always
